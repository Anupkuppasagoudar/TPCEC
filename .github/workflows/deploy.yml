name: Deploy Angular Site

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # --- THIS IS WHERE YOUR SNIPPET GOES ---
      - name: Build project
        run: |
          npx ng build app-name --configuration production --base-href /tpcec/
          cp dist/apps/app-name/index.html dist/apps/app-name/404.html
      # ---------------------------------------

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/app-name

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
