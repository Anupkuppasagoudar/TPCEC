name: Deploy Angular Site

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        # We specify the project name 'app-name' and the base-href
        # Replace 'tpcec' with your actual GitHub repository name
        run: npx ng build app-name --configuration production --base-href /tpcec/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This matches the outputPath from your angular.json
          path: dist/apps/app-name

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
