name: Deploy Angular Site

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: |
          # Install the specific builder in case it was missed
          npm install @angular-devkit/build-angular --legacy-peer-deps
          
          # Run the build
          npx ng build app-name --configuration production --base-href /tpcec/
          
          # Create 404 file
          cp dist/apps/app-name/index.html dist/apps/app-name/404.html || echo "Checking subfolders..."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Using the direct path from your angular.json
          path: dist/apps/app-name

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
