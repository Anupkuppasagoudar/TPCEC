name: Deploy Angular Site

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: |
          # Force the builder to be present
          npm install @angular-devkit/build-angular --legacy-peer-deps
          
          # Run the build
          npx ng build app-name --configuration production --base-href /tpcec/
          
          # AUTO-DETECT PATH: Check if files are in /browser or the root dist
          if [ -d "dist/apps/app-name/browser" ]; then
            cp dist/apps/app-name/browser/index.html dist/apps/app-name/browser/404.html
            echo "DEPLOY_PATH=dist/apps/app-name/browser" >> $GITHUB_ENV
          else
            cp dist/apps/app-name/index.html dist/apps/app-name/404.html || echo "File not found"
            echo "DEPLOY_PATH=dist/apps/app-name" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This uses the path detected in the build step
          path: ${{ env.DEPLOY_PATH }}

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
