name: Deploy Angular Site

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: |
          npm install @angular-devkit/build-angular --save-dev --legacy-peer-deps
          # Run build - Note: Ensure 'app-name' matches your project name in angular.json
          npx ng build app-name --configuration production --base-href /tpcec/
          
          # FLATTEN FOLDER LOGIC:
          # If /browser exists, move its contents to the root of dist/tpcec
          if [ -d "dist/tpcec/browser" ]; then
            echo "Angular 19 output detected. Flattening /browser folder..."
            mv dist/tpcec/browser/* dist/tpcec/
            rmdir dist/tpcec/browser
          fi
          
          # Create 404 fallback for Angular Routing
          cp dist/tpcec/index.html dist/tpcec/404.html
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Always upload the root of the dist folder
          path: dist/tpcec
  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
